<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gửi Vợ Yêu Của Anh</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Arial', sans-serif; }
        canvas { display: block; outline: none; }
        
        /* GIAO DIỆN MẬT KHẨU */
        #password-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #111;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: #ff4d6d;
        }
        #password-screen h2 {
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 0 0 10px #ff4d6d;
        }
        #password-screen input {
            padding: 12px;
            font-size: 16px;
            width: 80%;
            max-width: 350px;
            text-align: center;
            border: 2px solid #ff4d6d;
            border-radius: 25px;
            background: transparent;
            color: white;
            outline: none;
        }
        #password-screen button {
            padding: 12px 30px;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
            background-color: #ff4d6d;
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            box-shadow: 0 0 15px #ff4d6d;
            transition: 0.3s;
        }
        #password-screen button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <!-- MÀN HÌNH MẬT KHẨU -->
    <div id="password-screen">
        <h2>Em có yêu anh nhiều không?</h2>
        <input type="text" id="pass-input" placeholder="Nhập câu trả lời...">
        <button onclick="checkPassword()">Xác Nhận</button>
    </div>

    <!-- VÙNG CHỨA NHẠC YOUTUBE -->
    <div id="audio-container" style="display:none;"></div>

    <!-- Nhúng thư viện Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // XỬ LÝ MẬT KHẨU VÀ PHÁT NHẠC
        function checkPassword() {
            const input = document.getElementById('pass-input').value.trim();
            const correctPass = "Em yêu chồng đẹp trai của em nhiều lắm";
            
            if (input === correctPass) {
                document.getElementById('password-screen').style.display = 'none';
                
                // Mở nhạc Youtube (Auto play khi đã có tương tác click)
                const iframe = `<iframe width="1" height="1" src="https://www.youtube.com/embed/-Y9VtoPvtuM?autoplay=1&loop=1&playlist=-Y9VtoPvtuM" frameborder="0" allow="autoplay"></iframe>`;
                document.getElementById('audio-container').innerHTML = iframe;
                
                // Khởi động không gian 3D
                init3D();
            } else {
                alert("Sai rồi á! Phải khen chồng như thế nào nhờ? (Gợi ý: Em yêu chồng đẹp trai...)");
            }
        }

        // KHỞI TẠO KHÔNG GIAN 3D
        function init3D() {
            const scene = new THREE.Scene();
            
            // CAMERA
            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 15, 130);

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 1.0;

            // TẠO TEXTURE CHỮ "T" (Màu đỏ/hồng nhạt lấp lánh)
            function createLetterTexture() {
                const canvas = document.createElement('canvas');
                canvas.width = 128; 
                canvas.height = 128;
                const ctx = canvas.getContext('2d');
                
                ctx.fillStyle = '#ff4d6d'; // Màu hồng đỏ nhạt và sáng hơn
                ctx.font = 'bold 90px "Arial", sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                ctx.shadowColor = '#ff6699';
                ctx.shadowBlur = 15;
                ctx.fillText('T', 64, 64);
                return new THREE.CanvasTexture(canvas);
            }
            const tTexture = createLetterTexture();

            // TẠO TRÁI TIM LỚN 
            const particlesCount = 8000; 
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particlesCount * 3);
            const colors = new Float32Array(particlesCount * 3);
            const color = new THREE.Color();
            
            let added = 0;
            let attempts = 0;
            while (added < particlesCount && attempts < 500000) {
                attempts++;
                const x = (Math.random() - 0.5) * 3;
                const y = (Math.random() - 0.5) * 3;
                const z = (Math.random() - 0.5) * 3;
                
                const a = x*x + 2.25*y*y + z*z - 1;
                const val = a*a*a - x*x*z*z*z - 0.1125*y*y*z*z*z;
                
                if (val <= 0.0 && val > -0.3) {
                    const scale = 11; 
                    positions[added * 3] = x * scale;
                    positions[added * 3 + 1] = z * scale; 
                    positions[added * 3 + 2] = y * scale; 

                    // Pha màu cho sáng hơn
                    color.setHSL(0.98 + Math.random() * 0.02, 1.0, 0.6 + Math.random() * 0.2);
                    colors[added * 3] = color.r;
                    colors[added * 3 + 1] = color.g;
                    colors[added * 3 + 2] = color.b;
                    added++;
                }
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 2.0, 
                map: tTexture,
                vertexColors: true,
                transparent: true,
                opacity: 0.85,
                depthWrite: false, 
                blending: THREE.AdditiveBlending 
            });

            const heartMesh = new THREE.Points(geometry, material);
            heartMesh.position.y = 8; 
            scene.add(heartMesh);

            // TẠO VÒNG TRÒN CHỮ Ở DƯỚI
            function createTextRingTexture(wordsArray, textColor, fontSize) {
                const canvas = document.createElement('canvas');
                canvas.width = 2048;
                canvas.height = 2048;
                const ctx = canvas.getContext('2d');
                ctx.translate(1024, 1024);
                ctx.fillStyle = textColor; 
                ctx.font = `bold ${fontSize}px "Courier New", Courier, monospace`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const count = wordsArray.length;
                const radius = 850; 
                for (let i = 0; i < count; i++) {
                    ctx.save();
                    const angle = (i / count) * Math.PI * 2;
                    ctx.rotate(angle);
                    ctx.fillText(wordsArray[i], 0, -radius);
                    ctx.restore();
                }
                return new THREE.CanvasTexture(canvas);
            }

            const listWords = ['I love you', 'Thuỳ', 'Moaz', 'Love', 'Happy', 'Bé iu'];
            const listWords2 = ['Thuỳ', 'Bé iu', 'Love', 'I love you', 'Moaz', 'Happy'];
            
            const ringGeo = new THREE.PlaneGeometry(65, 65);
            const ringMat = new THREE.MeshBasicMaterial({ map: createTextRingTexture([...listWords, ...listWords]), transparent: true, opacity: 0.6, side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending });
            const textRing1 = new THREE.Mesh(ringGeo, ringMat);
            textRing1.rotation.x = -Math.PI / 2;
            textRing1.position.y = -10; 
            scene.add(textRing1);

            const ringGeo2 = new THREE.PlaneGeometry(45, 45);
            const ringMat2 = new THREE.MeshBasicMaterial({ map: createTextRingTexture([...listWords2, ...listWords2], '#cccccc', 50), transparent: true, opacity: 0.4, side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending });
            const textRing2 = new THREE.Mesh(ringGeo2, ringMat2);
            textRing2.rotation.x = -Math.PI / 2;
            textRing2.position.y = -10.1;
            scene.add(textRing2);

            // HIỆU ỨNG TẠO HẠT TIM NHỎ BAY TỪ VÒNG LÊN TRÁI TIM LỚN
            function createTinyHeart() {
                const canvas = document.createElement('canvas');
                canvas.width = 32; canvas.height = 32;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#ff6699';
                ctx.shadowColor = '#ff4d6d';
                ctx.shadowBlur = 5;
                ctx.beginPath();
                ctx.moveTo(16, 10);
                ctx.bezierCurveTo(16, 5, 10, 0, 5, 0);
                ctx.bezierCurveTo(0, 0, 0, 10, 0, 10);
                ctx.bezierCurveTo(0, 16, 16, 26, 16, 32);
                ctx.bezierCurveTo(16, 26, 32, 16, 32, 10);
                ctx.bezierCurveTo(32, 10, 32, 0, 27, 0);
                ctx.bezierCurveTo(22, 0, 16, 5, 16, 10);
                ctx.fill();
                return new THREE.CanvasTexture(canvas);
            }
            const tinyHeartTexture = createTinyHeart();
            const flyingHeartsCount = 150;
            const flyingGeo = new THREE.BufferGeometry();
            const flyingPos = new Float32Array(flyingHeartsCount * 3);
            const flyingVel = [];
            for(let i=0; i<flyingHeartsCount; i++) {
                const r = 30 * Math.random();
                const theta = Math.random() * 2 * Math.PI;
                flyingPos[i*3] = r * Math.cos(theta);
                flyingPos[i*3+1] = -10 + Math.random() * 18; 
                flyingPos[i*3+2] = r * Math.sin(theta);
                flyingVel.push(0.05 + Math.random() * 0.1); // Tốc độ bay lên
            }
            flyingGeo.setAttribute('position', new THREE.BufferAttribute(flyingPos, 3));
            const flyingMat = new THREE.PointsMaterial({
                size: 3.5, map: tinyHeartTexture, transparent: true, opacity: 0.7, depthWrite: false, blending: THREE.AdditiveBlending
            });
            const flyingParticles = new THREE.Points(flyingGeo, flyingMat);
            scene.add(flyingParticles);

            // TẠO 3 CHỮ "ANH" "YÊU" "EM" BAY LƯỢN XUNG QUANH NHƯ CHIM
            function createFloatingWord(word, color) {
                const canvas = document.createElement('canvas');
                canvas.width = 256; canvas.height = 128;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = color;
                ctx.font = 'bold 50px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = color;
                ctx.shadowBlur = 10;
                ctx.fillText(word, 128, 64);
                const texture = new THREE.CanvasTexture(canvas);
                const mat = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending });
                const sprite = new THREE.Sprite(mat);
                sprite.scale.set(12, 6, 1);
                return sprite;
            }
            const wordAnh = createFloatingWord("Anh", "#ffffff");
            const wordYeu = createFloatingWord("Yêu", "#ff6699");
            const wordEm = createFloatingWord("Em", "#ffffff");
            scene.add(wordAnh);
            scene.add(wordYeu);
            scene.add(wordEm);

            // NỀN BẦU TRỜI SAO
            const starGeo = new THREE.BufferGeometry();
            const starPos = new Float32Array(1500 * 3);
            for(let i = 0; i < 1500 * 3; i++) {
                starPos[i] = (Math.random() - 0.5) * 350;
            }
            starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
            const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.7, transparent: true, opacity: 0.5 });
            const stars = new THREE.Points(starGeo, starMat);
            scene.add(stars);

            // ANIMATION LẶP
            let time = 0;
            function animate() {
                requestAnimationFrame(animate);
                time += 0.015;

                // Tim đập
                const scale = 1 + 0.03 * Math.sin(time * 4);
                heartMesh.scale.set(scale, scale, scale);

                // Hai vòng tròn xoay
                textRing1.rotation.z -= 0.002;
                textRing2.rotation.z += 0.003;
                
                // Cập nhật vị trí các hạt tim bay (Hút vào lõi trái tim)
                const flyPos = flyingParticles.geometry.attributes.position.array;
                for(let i=0; i<flyingHeartsCount; i++) {
                    flyPos[i*3+1] += flyingVel[i]; // Bay lên
                    flyPos[i*3] += (0 - flyPos[i*3]) * 0.02; // Hút nhẹ vào tâm X
                    flyPos[i*3+2] += (0 - flyPos[i*3+2]) * 0.02; // Hút nhẹ vào tâm Z
                    
                    // Khi bay tới lõi trái tim thì reset rớt xuống vòng tròn dưới cùng
                    if (flyPos[i*3+1] > 8) {
                        const r = 25 + Math.random() * 10;
                        const theta = Math.random() * 2 * Math.PI;
                        flyPos[i*3] = r * Math.cos(theta);
                        flyPos[i*3+1] = -10;
                        flyPos[i*3+2] = r * Math.sin(theta);
                    }
                }
                flyingParticles.geometry.attributes.position.needsUpdate = true;

                // Chữ Anh Yêu Em bay lượn ngẫu nhiên
                wordAnh.position.set(Math.sin(time * 0.8) * 18, Math.cos(time * 0.5) * 6 + 8, Math.sin(time * 0.6) * 18);
                wordYeu.position.set(Math.sin(time * 0.7 + 2) * 20, Math.cos(time * 0.6 + 1) * 7 + 8, Math.sin(time * 0.5 + 2) * 20);
                wordEm.position.set(Math.sin(time * 0.9 + 4) * 17, Math.cos(time * 0.4 + 2) * 5 + 8, Math.sin(time * 0.8 + 4) * 17);

                stars.rotation.y += 0.0003;
                controls.update();
                renderer.render(scene, camera);
            }

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();
        }
    </script>
</body>
</html>
