<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gửi Vợ Yêu Của Anh</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Arial', sans-serif; }
        canvas { display: block; outline: none; }
        
        /* GIAO DIỆN MẬT KHẨU */
        #password-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0a0a0a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: #ff8da1;
        }
        #password-screen h2 {
            font-size: 22px;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 0 0 10px rgba(255, 141, 161, 0.5);
        }
        #password-screen input {
            padding: 12px;
            font-size: 16px;
            width: 80%;
            max-width: 350px;
            text-align: center;
            border: 2px solid #ff8da1;
            border-radius: 25px;
            background: transparent;
            color: white;
            outline: none;
        }
        #password-screen button {
            padding: 12px 30px;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
            background-color: #ff8da1;
            color: #000;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(255, 141, 161, 0.5);
            transition: 0.3s;
        }
        #password-screen button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="password-screen">
        <h2>Em có yêu anh nhiều không?</h2>
        <input type="text" id="pass-input" placeholder="Nhập câu trả lời...">
        <button onclick="checkPassword()">Xác Nhận</button>
    </div>

    <audio id="bg-music" src="nhac.mp3" loop preload="auto"></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // XỬ LÝ MẬT KHẨU VÀ PHÁT NHẠC MOBILE
        function checkPassword() {
            const input = document.getElementById('pass-input').value.trim();
            const correctPass = "Em yêu chồng đẹp trai của em nhiều lắm";
            
            if (input === correctPass) {
                document.getElementById('password-screen').style.display = 'none';
                
                // Mở nhạc trực tiếp qua Audio Object - Đảm bảo kêu 100% trên điện thoại
                document.getElementById('bg-music').play();
                
                init3D();
            } else {
                alert("Sai rồi á! Phải khen chồng như thế nào nhờ? (Gợi ý: Em yêu chồng đẹp trai...)");
            }
        }

        function init3D() {
            const scene = new THREE.Scene();
            
            // CAMERA
            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 15, 130);

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 1.0;

            // TEXTURE CHỮ "T" MÀU ĐỎ NHẠT / PASTEL
            function createLetterTexture() {
                const canvas = document.createElement('canvas');
                canvas.width = 128; 
                canvas.height = 128;
                const ctx = canvas.getContext('2d');
                
                ctx.fillStyle = '#e57385'; // Đỏ nhạt / Mờ theo ảnh
                ctx.font = 'bold 90px "Arial", sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                ctx.shadowColor = '#d96675';
                ctx.shadowBlur = 8;
                ctx.fillText('T', 64, 64);
                return new THREE.CanvasTexture(canvas);
            }
            const tTexture = createLetterTexture();

            // TẠO TRÁI TIM LỚN (MÀU MỜ)
            const particlesCount = 8000; 
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particlesCount * 3);
            const colors = new Float32Array(particlesCount * 3);
            const color = new THREE.Color();
            
            let added = 0;
            let attempts = 0;
            while (added < particlesCount && attempts < 500000) {
                attempts++;
                const x = (Math.random() - 0.5) * 3;
                const y = (Math.random() - 0.5) * 3;
                const z = (Math.random() - 0.5) * 3;
                
                const a = x*x + 2.25*y*y + z*z - 1;
                const val = a*a*a - x*x*z*z*z - 0.1125*y*y*z*z*z;
                
                if (val <= 0.0 && val > -0.3) {
                    const scale = 11; 
                    positions[added * 3] = x * scale;
                    positions[added * 3 + 1] = z * scale; 
                    positions[added * 3 + 2] = y * scale; 

                    // Pha màu tone pastel, giảm rực rỡ
                    color.setHSL(0.96 + Math.random() * 0.04, 0.55 + Math.random() * 0.1, 0.6 + Math.random() * 0.1);
                    colors[added * 3] = color.r;
                    colors[added * 3 + 1] = color.g;
                    colors[added * 3 + 2] = color.b;
                    added++;
                }
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 2.0, 
                map: tTexture,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                depthWrite: false, 
                blending: THREE.AdditiveBlending 
            });

            const heartMesh = new THREE.Points(geometry, material);
            heartMesh.position.y = 8; 
            scene.add(heartMesh);

            // TẠO CÁC CHỮ PHẲNG NẰM TRÊN MẶT ĐẤT ĐỂ LÀM LỐC XOÁY
            function createTextPlane(text) {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                ctx.font = 'bold 36px "Courier New", monospace';
                const metrics = ctx.measureText(text);
                canvas.width = metrics.width + 20;
                canvas.height = 50;
                
                ctx.font = 'bold 36px "Courier New", monospace';
                ctx.fillStyle = '#ffb3c6'; // Chữ hồng nhạt
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(text, canvas.width/2, canvas.height/2);

                const texture = new THREE.CanvasTexture(canvas);
                const geo = new THREE.PlaneGeometry(canvas.width / 15, canvas.height / 15);
                const mat = new THREE.MeshBasicMaterial({
                    map: texture,
                    transparent: true,
                    opacity: 1,
                    side: THREE.DoubleSide,
                    depthWrite: false,
                    blending: THREE.AdditiveBlending
                });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.rotation.x = -Math.PI / 2; // Đặt chữ nằm bẹp xuống mâm
                return mesh;
            }

            // MẢNG LƯU TRỮ CÁC CHỮ TRONG LỐC XOÁY VORTEX
            const wordsList = ['I love you', 'Thuỳ', 'Moaz', 'Love', 'Happy', 'Bé iu', 'Anh Yêu Em', 'Thật sự yêu em rất nhiều đó ❤️'];
            const vortexWords = [];
            const vortexCount = 80; // Số lượng chữ xoay

            for (let i = 0; i < vortexCount; i++) {
                const randomWord = wordsList[Math.floor(Math.random() * wordsList.length)];
                const mesh = createTextPlane(randomWord);
                
                // Khởi tạo vị trí ngẫu nhiên trong dải bán kính từ 5 đến 60
                const radius = 5 + Math.random() * 55; 
                const angle = Math.random() * Math.PI * 2;
                const speed = 0.01 + Math.random() * 0.02; // Tốc độ xoay
                
                mesh.position.y = -10; // Cùng độ sâu dưới đáy
                
                vortexWords.push({ mesh, radius, angle, speed });
                scene.add(mesh);
            }

            // CHIM BAY "ANH" "YÊU" "EM"
            function createFloatingWord(word, color) {
                const canvas = document.createElement('canvas');
                canvas.width = 256; canvas.height = 128;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = color;
                ctx.font = 'bold 45px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(word, 128, 64);
                const texture = new THREE.CanvasTexture(canvas);
                const mat = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending });
                const sprite = new THREE.Sprite(mat);
                sprite.scale.set(10, 5, 1);
                return sprite;
            }
            const wordAnh = createFloatingWord("Anh", "#ffffff");
            const wordYeu = createFloatingWord("Yêu", "#ffb3c6");
            const wordEm = createFloatingWord("Em", "#ffffff");
            scene.add(wordAnh);
            scene.add(wordYeu);
            scene.add(wordEm);

            // BẦU TRỜI SAO
            const starGeo = new THREE.BufferGeometry();
            const starPos = new Float32Array(1500 * 3);
            for(let i = 0; i < 1500 * 3; i++) {
                starPos[i] = (Math.random() - 0.5) * 350;
            }
            starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
            const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.7, transparent: true, opacity: 0.5 });
            const stars = new THREE.Points(starGeo, starMat);
            scene.add(stars);

            // ANIMATION LẶP
            let time = 0;
            function animate() {
                requestAnimationFrame(animate);
                time += 0.015;

                // Tim đập nhẹ
                const scale = 1 + 0.02 * Math.sin(time * 3);
                heartMesh.scale.set(scale, scale, scale);

                // HIỆU ỨNG LỐC XOÁY VORTEX CUỐN VÀO TÂM
                vortexWords.forEach(vw => {
                    vw.radius -= 0.1; // Càng ngày càng tụt vào tâm
                    vw.angle -= vw.speed; // Xoay vòng

                    // Nếu chữ chui quá sâu vào tâm -> Hồi sinh lại ở mép ngoài cùng
                    if (vw.radius < 5) {
                        vw.radius = 60;
                        vw.angle = Math.random() * Math.PI * 2;
                    }

                    // Tính toán vị trí X và Z
                    vw.mesh.position.x = vw.radius * Math.cos(vw.angle);
                    vw.mesh.position.z = vw.radius * Math.sin(vw.angle);
                    
                    // Xoay mặt chữ để tạo cảm giác trôi theo dòng nước
                    vw.mesh.rotation.z = -vw.angle;

                    // Hiệu ứng mờ dần: Sinh ra mờ -> rõ -> vào tâm mờ dần mất đi
                    if (vw.radius > 50) {
                        vw.mesh.material.opacity = (60 - vw.radius) / 10; // Vừa sinh ra ngoài rìa thì mờ
                    } else if (vw.radius < 15) {
                        vw.mesh.material.opacity = (vw.radius - 5) / 10; // Sắp chết ở lõi thì mờ dần
                    } else {
                        vw.mesh.material.opacity = 1; // Đoạn giữa thì sáng rõ
                    }
                });

                // Chữ Anh Yêu Em bay lượn ngẫu nhiên
                wordAnh.position.set(Math.sin(time * 0.8) * 16, Math.cos(time * 0.5) * 6 + 8, Math.sin(time * 0.6) * 16);
                wordYeu.position.set(Math.sin(time * 0.7 + 2) * 18, Math.cos(time * 0.6 + 1) * 7 + 8, Math.sin(time * 0.5 + 2) * 18);
                wordEm.position.set(Math.sin(time * 0.9 + 4) * 15, Math.cos(time * 0.4 + 2) * 5 + 8, Math.sin(time * 0.8 + 4) * 15);

                stars.rotation.y += 0.0003;
                controls.update();
                renderer.render(scene, camera);
            }

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();
        }
    </script>
</body>
</html>
