<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trái Tim Tặng Bạn - Xịn Hơn</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', sans-serif; /* Sử dụng font chữ đẹp hơn */
        }
        
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap');

        canvas {
            position: absolute;
            z-index: 1;
        }

        .text-container {
            position: absolute;
            z-index: 3;
            color: #ff4d6d;
            text-align: center;
            pointer-events: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            margin-top: -150px; /* Di chuyển văn bản lên trên trái tim */
        }
        
        h1 {
            font-size: 3rem;
            margin: 0;
            text-shadow: 0 0 15px #ff4d6d, 0 0 30px #ff4d6d;
            letter-spacing: 2px;
        }
        
        p {
            font-size: 1.4rem;
            margin-top: 15px;
            color: white;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
            min-height: 1.6em; /* Giữ chỗ cho hiệu ứng đánh chữ */
        }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            p { font-size: 1.1rem; }
            .text-container { margin-top: -100px; }
        }
    </style>
</head>
<body>

    <div class="text-container">
        <!-- BẠN CÓ THỂ SỬA CHỮ Ở ĐÂY -->
        <h1>Anh Yêu Em</h1>
        <p id="typingText"></p>
    </div>

    <!-- Canvas cho nền sao -->
    <canvas id="starfieldCanvas"></canvas>
    <!-- Canvas cho trái tim chính -->
    <canvas id="heartCanvas"></canvas>
    <!-- Canvas cho phản chiếu -->
    <canvas id="reflectionCanvas"></canvas>

    <script>
        const heartCanvas = document.getElementById('heartCanvas');
        const heartCtx = heartCanvas.getContext('2d');
        const reflectionCanvas = document.getElementById('reflectionCanvas');
        const reflectionCtx = reflectionCanvas.getContext('2d');
        const starfieldCanvas = document.getElementById('starfieldCanvas');
        const starfieldCtx = starfieldCanvas.getContext('2d');
        const typingText = document.getElementById('typingText');

        // Cài đặt
        const settings = {
            particles: 600, // Số lượng hạt trái tim
            heartSize: 350, // Kích thước trái tim
            color: '#ff3050', // Màu trái tim
            reflectionBlur: 20, // Độ mờ phản chiếu
            reflectionOpacity: 0.35, // Độ mờ của phản chiếu
            stars: 200, // Số lượng ngôi sao
            typingSpeed: 60, // Tốc độ đánh chữ (ms/ký tự)
            // BẠN CÓ THỂ SỬA DÒNG CHỮ THỨ HAI Ở ĐÂY
            message: "Mã nguồn này xịn hơn nhiều! ...và hoàn toàn miễn phí nha! ❤️"
        };

        let width, height, centerX, centerY;
        let particles = [];
        let reflectionParticles = [];
        let stars = [];
        let time = 0;

        // Resize Canvas
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
            
            heartCanvas.width = width;
            heartCanvas.height = height;
            reflectionCanvas.width = width;
            reflectionCanvas.height = height;
            starfieldCanvas.width = width;
            starfieldCanvas.height = height;
            
            createStars();
        }

        // Lớp hạt trái tim
        class Particle {
            constructor(x, y, dx, dy, size, color) {
                this.x = x;
                this.y = y;
                this.dx = dx;
                this.dy = dy;
                this.size = size;
                this.color = color;
                this.age = 0;
                this.duration = Math.random() * 2 + 1; // 1-3 giây
            }

            update(dt) {
                this.x += this.dx * dt;
                this.y += this.dy * dt;
                // Hiệu ứng tụ lại
                this.dx *= 0.98;
                this.dy *= 0.98;
                this.age += dt;
            }

            draw(ctx) {
                const opacity = 1 - (this.age / this.duration);
                if (opacity <= 0) return false;
                ctx.globalAlpha = opacity;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                return true;
            }
        }

        // Tạo hạt trái tim
        function emitParticles() {
            for (let i = 0; i < settings.particles / 10; i++) {
                const t = Math.PI - 2 * Math.PI * Math.random();
                const pos = pointOnHeart(t, settings.heartSize * (1 + 0.02 * Math.sin(time * 3))); // Hiệu ứng đập
                const dir = {
                    x: pos.x * 0.1,
                    y: -pos.y * 0.1 // Di chuyển lên
                };
                particles.push(new Particle(centerX + pos.x, centerY - pos.y, dir.x, dir.y, Math.random() * 2 + 1, settings.color));
            }
        }

        // Công thức hình trái tim
        function pointOnHeart(t, size) {
            return {
                x: size * 0.16 * Math.pow(Math.sin(t), 3),
                y: -size * 0.13 * Math.cos(t) + size * 0.05 * Math.cos(2 * t) + size * 0.02 * Math.cos(3 * t) + size * 0.01 * Math.cos(4 * t)
            };
        }

        // Ngôi sao
        class Star {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2;
                this.opacity = Math.random();
                this.velocity = Math.random() * 0.1;
            }

            update() {
                this.y += this.velocity;
                if (this.y > height) this.y = 0;
            }

            draw(ctx) {
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createStars() {
            stars = [];
            for (let i = 0; i < settings.stars; i++) {
                stars.push(new Star());
            }
        }

        // Hiệu ứng đánh chữ
        function startTypingEffect() {
            let i = 0;
            typingText.innerHTML = "";
            const interval = setInterval(() => {
                if (i < settings.message.length) {
                    typingText.innerHTML += settings.message.charAt(i);
                    i++;
                } else {
                    clearInterval(interval);
                    // Lặp lại hiệu ứng đánh chữ sau 5 giây
                    setTimeout(startTypingEffect, 5000);
                }
            }, settings.typingSpeed);
        }

        // Main animation loop
        let lastTime = 0;
        function animate(timestamp) {
            requestAnimationFrame(animate);
            if (!timestamp) timestamp = 0;
            const dt = (timestamp - lastTime) / 1000; // Delta time in seconds
            lastTime = timestamp;
            time += dt;

            // Clear canvases
            heartCtx.clearRect(0, 0, width, height);
            reflectionCtx.clearRect(0, 0, width, height);
            starfieldCtx.clearRect(0, 0, width, height);

            // Vẽ nền sao
            for (const star of stars) {
                star.update();
                star.draw(starfieldCtx);
            }

            // Tạo và vẽ hạt trái tim
            emitParticles();
            
            // Vẽ phản chiếu trước
            reflectionCtx.filter = `blur(${settings.reflectionBlur}px)`;
            reflectionCtx.globalAlpha = settings.reflectionOpacity;
            reflectionCtx.save();
            reflectionCtx.translate(0, centerY + settings.heartSize / 1.5); // Di chuyển xuống bề mặt phản chiếu
            reflectionCtx.scale(1, -0.6); // Lật và làm phẳng
            particles = particles.filter(p => {
                p.update(dt);
                p.draw(reflectionCtx); // Vẽ lên canvas phản chiếu trước
                return p.age < p.duration;
            });
            reflectionCtx.restore();

            // Vẽ trái tim chính (không mờ)
            for (const p of particles) {
                p.draw(heartCtx);
            }
        }

        // Khởi tạo
        window.addEventListener('resize', resize);
        resize();
        startTypingEffect();
        animate();

    </script>
</body>
</html>
