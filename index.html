<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trái Tim 3D Tặng Em</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Arial', sans-serif; }
        canvas { display: block; }
        #text-overlay {
            position: absolute;
            bottom: 10%;
            width: 100%;
            text-align: center;
            color: #ff4d6d;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #ff4d6d, 0 0 20px #ff4d6d;
            pointer-events: none;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="text-overlay">Thật sự yêu em rất nhiều đó ❤️</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // 1. Khởi tạo Không gian 3D (Scene, Camera, Renderer)
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 60;
        camera.position.y = 10;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true; // Tự động xoay 3D
        controls.autoRotateSpeed = 2.0;

        // 2. Tạo hình Trái tim 3D từ các hạt (Particles)
        const particlesCount = 8000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particlesCount * 3);
        const colors = new Float32Array(particlesCount * 3);
        const color = new THREE.Color();

        for (let i = 0; i < particlesCount; i++) {
            // Toán học tạo hình trái tim 3D
            const u = Math.random() * Math.PI * 2;
            const v = Math.random() * Math.PI;
            
            const x = 16 * Math.pow(Math.sin(u), 3) * Math.sin(v);
            const y = (13 * Math.cos(u) - 5 * Math.cos(2*u) - 2 * Math.cos(3*u) - Math.cos(4*u)) * Math.sin(v);
            const z = 8 * Math.cos(v); // Độ dày của trái tim

            // Phóng to lên chút
            const scale = 1.2;
            positions[i * 3] = x * scale;
            positions[i * 3 + 1] = y * scale;
            positions[i * 3 + 2] = z * scale;

            // Màu đỏ/hồng lấp lánh
            color.setHSL(0.95 + Math.random() * 0.05, 1.0, 0.4 + Math.random() * 0.4);
            colors[i * 3] = color.r;
            colors[i * 3 + 1] = color.g;
            colors[i * 3 + 2] = color.b;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        // Material cho hạt
        const material = new THREE.PointsMaterial({
            size: 0.3,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending
        });

        const heartMesh = new THREE.Points(geometry, material);
        // Trái tim theo công thức bị ngược, nên lật lại
        heartMesh.rotation.x = Math.PI; 
        scene.add(heartMesh);

        // 3. Tạo Vòng sáng/chữ xoay quanh bên dưới (tạo cảm giác giống phản chiếu/đĩa chữ)
        const ringGeo = new THREE.TorusGeometry(20, 0.1, 16, 100);
        const ringMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.2, transparent: true, opacity: 0.5 });
        const ring1 = new THREE.Points(ringGeo, ringMat);
        ring1.rotation.x = Math.PI / 2;
        ring1.position.y = -25;
        scene.add(ring1);

        const ringGeo2 = new THREE.TorusGeometry(15, 0.1, 16, 100);
        const ring2 = new THREE.Points(ringGeo2, ringMat);
        ring2.rotation.x = Math.PI / 2;
        ring2.position.y = -25;
        scene.add(ring2);

        // 4. Bầu trời sao (Starfield)
        const starGeo = new THREE.BufferGeometry();
        const starPos = new Float32Array(1500 * 3);
        for(let i=0; i<1500*3; i++) {
            starPos[i] = (Math.random() - 0.5) * 200;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({color: 0xffffff, size: 0.4, transparent: true, opacity: 0.8});
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        // 5. Hiệu ứng nhịp đập (Pulse) và Vòng lặp render
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.05;

            // Làm trái tim đập nhẹ
            const scale = 1 + 0.05 * Math.sin(time);
            heartMesh.scale.set(scale, scale, scale);

            // Xoay các vòng sáng
            ring1.rotation.z -= 0.01;
            ring2.rotation.z += 0.015;
            stars.rotation.y += 0.001;

            controls.update(); // Cập nhật camera xoay
            renderer.render(scene, camera);
        }

        // Tự động căn chỉnh khi đổi kích thước màn hình
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
