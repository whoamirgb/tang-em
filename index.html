<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Trái Tim 3D - Dành Tặng Thuỳ</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Arial', sans-serif; }
        canvas { display: block; outline: none; }
    </style>
</head>
<body>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const scene = new THREE.Scene();
        
        // 1. CHỈNH LẠI CAMERA (Lùi ra xa để vừa màn hình điện thoại)
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 120); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        // Quan trọng: Khử mờ trên màn hình điện thoại độ phân giải cao
        renderer.setPixelRatio(window.devicePixelRatio); 
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.0;

        // 2. TẠO CHỮ "T" SẮC NÉT
        function createLetterTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 128; // Tăng độ phân giải cho nét chữ
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ff1493'; // Màu hồng đậm/đỏ rực
            ctx.font = 'bold 90px "Arial", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            // Thêm hiệu ứng lấp lánh nhẹ cho viền chữ
            ctx.shadowColor = '#ff1493';
            ctx.shadowBlur = 10;
            ctx.fillText('T', 64, 64);
            return new THREE.CanvasTexture(canvas);
        }
        const tTexture = createLetterTexture();

        // 3. TẠO HÌNH TRÁI TIM (Thu nhỏ lại để không lẹm viền)
        const particlesCount = 7000; // Giảm bớt số lượng để chữ T không bị nén thành cục
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particlesCount * 3);
        
        let added = 0;
        while (added < particlesCount) {
            const x = (Math.random() - 0.5) * 3;
            const y = (Math.random() - 0.5) * 3;
            const z = (Math.random() - 0.5) * 3;
            
            const a = x*x + 2.25*y*y + z*z - 1;
            const val = a*a*a - x*x*z*z*z - 0.1125*y*y*z*z*z;
            
            if (val <= 0) {
                const scale = 10; // Tỉ lệ vừa vặn (cũ là 14 quá to)
                positions[added * 3] = x * scale;
                positions[added * 3 + 1] = z * scale; 
                positions[added * 3 + 2] = y * scale; 
                added++;
            }
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        const material = new THREE.PointsMaterial({
            size: 2.8, // Kích thước chữ T to và rõ hơn
            map: tTexture,
            transparent: true,
            opacity: 0.9,
            depthWrite: false, // Tránh lỗi các chữ đè lên nhau bị đen viền
            blending: THREE.AdditiveBlending // Tạo độ sáng lấp lánh
        });

        const heartMesh = new THREE.Points(geometry, material);
        heartMesh.position.y = 8; // Đẩy lên một xíu cho cân đối
        scene.add(heartMesh);

        // 4. VÒNG CHỮ XOAY DƯỚI ĐÁY
        function createTextRingTexture(wordsArray, color, fontSize) {
            const canvas = document.createElement('canvas');
            canvas.width = 2048;
            canvas.height = 2048;
            const ctx = canvas.getContext('2d');
            
            ctx.translate(1024, 1024);
            ctx.fillStyle = color; 
            ctx.font = `bold ${fontSize}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            const count = wordsArray.length;
            const radius = 850; 
            for (let i = 0; i < count; i++) {
                ctx.save();
                const angle = (i / count) * Math.PI * 2;
                ctx.rotate(angle);
                ctx.fillText(wordsArray[i], 0, -radius);
                ctx.restore();
            }
            return new THREE.CanvasTexture(canvas);
        }

        const list1 = ['I love you', 'Thuỳ', 'Moaz', 'Love', 'Happy', 'Bé iu', 'I love you', 'Thuỳ', 'Moaz', 'Love', 'Happy', 'Bé iu'];
        const list2 = ['Thuỳ', 'Bé iu', 'Love', 'I love you', 'Moaz', 'Happy', 'Thuỳ', 'Bé iu', 'Love', 'I love you', 'Moaz', 'Happy'];

        // Vòng ngoài (Màu hồng sáng)
        const ringGeo1 = new THREE.PlaneGeometry(65, 65);
        const ringMat1 = new THREE.MeshBasicMaterial({ 
            map: createTextRingTexture(list1, '#ff6699', 55), 
            transparent: true, 
            side: THREE.DoubleSide,
            depthWrite: false,
            blending: THREE.AdditiveBlending 
        });
        const textRing1 = new THREE.Mesh(ringGeo1, ringMat1);
        textRing1.rotation.x = -Math.PI / 2;
        textRing1.position.y = -12; 
        scene.add(textRing1);

        // Vòng trong (Màu hồng nhạt, nhỏ hơn)
        const ringGeo2 = new THREE.PlaneGeometry(45, 45);
        const ringMat2 = new THREE.MeshBasicMaterial({ 
            map: createTextRingTexture(list2, '#ff99bb', 50), 
            transparent: true, 
            side: THREE.DoubleSide,
            depthWrite: false,
            blending: THREE.AdditiveBlending 
        });
        const textRing2 = new THREE.Mesh(ringGeo2, ringMat2);
        textRing2.rotation.x = -Math.PI / 2;
        textRing2.position.y = -12.1;
        scene.add(textRing2);

        // 5. NỀN BẦU TRỜI SAO
        const starGeo = new THREE.BufferGeometry();
        const starPos = new Float32Array(1000 * 3);
        for(let i = 0; i < 1000 * 3; i++) {
            starPos[i] = (Math.random() - 0.5) * 300;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.8, transparent: true, opacity: 0.7 });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        // 6. ANIMATION (Chuyển động)
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.02;

            // Tim đập
            const scale = 1 + 0.04 * Math.sin(time * 3);
            heartMesh.scale.set(scale, scale, scale);

            // Vòng chữ xoay
            textRing1.rotation.z -= 0.002;
            textRing2.rotation.z += 0.003;
            
            // Sao trôi lững lờ
            stars.rotation.y += 0.0005;

            controls.update();
            renderer.render(scene, camera);
        }

        // Tự động căn chỉnh khi xoay ngang/dọc điện thoại
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
